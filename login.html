<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>👨‍🎓 Student Login</h2>
            <p class="login-intro">Enter your credentials to view your parcels</p>
            
            <form onsubmit="handleStudentLogin(event)">
                <div class="form-group">
                    <label for="sap_id">SAP ID or Phone Number</label>
                    <input type="text" id="sap_id" placeholder="12345001 or 9876543210" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <p class="login-help">
                Don't have an account? <a href="register.html" class="login-link">Register here</a>
            </p>

            <p class="login-help">
                <a href="role_selection.html" class="login-link">← Back to Role Selection</a>
            </p>
        </div>
    </div>

    <script>
        function handleStudentLogin(event) {
            event.preventDefault();
            const sapId = document.getElementById('sap_id').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!sapId || !password) {
                alert('Please enter both SAP ID and Password');
                return;
            }

            // Store login data
            const loginData = {
                sapId: sapId,
                role: 'student',
                loginTime: new Date().toISOString()
            };

            localStorage.setItem('studentLogin', JSON.stringify(loginData));
            
            // Redirect to student dashboard
            setTimeout(() => {
                window.location.href = 'student_dashboard.html';
            }, 100);
        }

        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        handleStudentLogin(e);
                    }
                });
            }
        });
    </script>
</body>
</html>
