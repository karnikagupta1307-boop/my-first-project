<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>👮 Admin Login</h2>
            <p class="login-intro">Enter your credentials to access the admin panel</p>

            <div id="errorMessage" style="background-color: #f8d7da; color: #721c24; padding: 0.8rem; border-radius: 6px; margin-bottom: 1.5rem; border-left: 4px solid #d32f2f; display: none;">
                Invalid username or password. Please try again.
            </div>

            <form id="loginForm" onsubmit="return handleAdminLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <p class="login-help" style="margin-top: 1.5rem;">
                <a href="role_selection.html" class="login-link">← Back to Role Selection</a>
            </p>
        </div>
    </div>

    <script>
        function handleAdminLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            if (!username || !password) {
                errorMessage.textContent = 'Please enter both username and password';
                errorMessage.style.display = 'block';
                return false;
            }

            const validCredentials = [
                { username: 'admin', password: 'admin123' },
                { username: 'watchman', password: 'pass123' },
                { username: 'staff', password: 'staff123' }
            ];

            const isValid = validCredentials.some(cred => 
                cred.username === username && cred.password === password
            );

            if (!isValid) {
                errorMessage.textContent = 'Invalid credentials. Try watchman / pass123 or admin / admin123';
                errorMessage.style.display = 'block';
                return false;
            }

            errorMessage.style.display = 'none';

            const loginData = {
                username: username,
                role: 'admin',
                loginTime: new Date().toISOString()
            };

            localStorage.setItem('adminLogin', JSON.stringify(loginData));
            localStorage.removeItem('studentLogin');
            
            window.location.href = 'dashboard.html';
            return false;
        }
    </script>
</body>
</html>
