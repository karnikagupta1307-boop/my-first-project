<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Parcels - Smart Parcel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1>🎓 Smart Parcel Management System</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">👮 Admin</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="manage_parcels.html" class="active">Manage Parcels</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2 class="page-title">Manage Parcels</h2>

        <!-- SUCCESS MESSAGE -->
        <div class="success-message" id="successMessage">
            <h4>✓ Success!</h4>
            <p id="successText">Parcel status has been updated to "Delivered".</p>
        </div>

        <!-- FILTER & SEARCH SECTION -->
        <div class="filter-container">
            <div class="filter-group">
                <label for="dateFilter">📅 Filter by Date</label>
                <input type="date" id="dateFilter" onchange="filterParcels()">
            </div>

            <div class="filter-group">
                <label for="parcelIdSearch">📦 Search by Parcel ID</label>
                <input type="text" id="parcelIdSearch" placeholder="Enter parcel number (e.g., 1, 2, 3)" oninput="filterParcels()">
            </div>

            <div class="filter-group" style="grid-column: 1 / -1;">
                <label for="searchInput">🔍 General Search (Name / Phone / SAP ID)</label>
                <div class="search-group">
                    <input type="text" id="searchInput" placeholder="Search by student name, phone, or SAP ID" oninput="searchParcels()">
                    <button class="btn btn-secondary" onclick="filterParcels()" style="margin-right: 0.75rem;">Search</button>
                    <button class="btn btn-primary" onclick="clearFilters()">Clear All</button>
                </div>
            </div>
        </div>

        <!-- PARCELS TABLE -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Parcel ID</th>
                        <th>Student Name</th>
                        <th>SAP ID</th>
                        <th>Phone</th>
                        <th>Source</th>
                        <th>Arrival Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="parcelTableBody">
                </tbody>
            </table>
        </div>

        <div id="noResultsMessage" class="no-results" style="display: none;">
            No parcels found. Try adjusting your filters or search terms.
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let parcels = [];
        let filteredParcels = [];

        async function checkAdminLogin() {
            const adminLogin = localStorage.getItem('adminLogin');
            if (!adminLogin) {
                window.location.href = 'admin_login.html';
                return;
            }

            try {
                const data = JSON.parse(adminLogin);
                if (!data.username) {
                    // Invalid login data
                    localStorage.removeItem('adminLogin');
                    window.location.href = 'admin_login.html';
                    return;
                }
                
                document.getElementById('userDisplay').textContent = '👮 ' + data.username;
                await loadParcels();
            } catch (e) {
                console.error('Error parsing login data:', e);
                localStorage.removeItem('adminLogin');
                window.location.href = 'admin_login.html';
            }
        }

        function logout() {
            localStorage.removeItem('adminLogin');
            window.location.href = 'role_selection.html';
        }

        async function loadParcels() {
            try {
                const response = await fetch(`${API_BASE_URL}/parcels`);
                parcels = await response.json();
                filteredParcels = [...parcels];
                renderTable();
            } catch (error) {
                console.error('Error loading parcels:', error);
                alert('Failed to load parcels from server');
            }
        }

        function renderTable() {
            const tableBody = document.getElementById('parcelTableBody');
            const noResults = document.getElementById('noResultsMessage');

            if (filteredParcels.length === 0) {
                tableBody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            tableBody.innerHTML = filteredParcels.map((parcel) => {
                return `
                <tr>
                    <td><strong>${parcel.parcel_id}</strong></td>
                    <td>${parcel.student_name}</td>
                    <td>${parcel.sap_id || 'N/A'}</td>
                    <td>${parcel.phone}</td>
                    <td>${parcel.source}</td>
                    <td>${formatDate(parcel.arrival_date)}</td>
                    <td>
                        <span class="card-status status-${parcel.status.toLowerCase()}">
                            ${parcel.status}
                        </span>
                    </td>
                    <td>
                        ${parcel.status === 'Arrived' ? 
                            `<button class="btn btn-small btn-primary" onclick="markAsDelivered('${parcel.parcel_id}')">
                                Mark as Delivered
                            </button>` 
                            : 
                            `<span class="delivered-badge">✓ Delivered</span>`
                        }
                    </td>
                </tr>
            `;
            }).join('');
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN');
        }

        async function markAsDelivered(parcelId) {
            try {
                const response = await fetch(`${API_BASE_URL}/parcels/${parcelId}/deliver`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    const data = await response.json();
                    alert(data.error || 'Failed to update parcel');
                    return;
                }

                await loadParcels();

                const successMessage = document.getElementById('successMessage');
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 3000);
            } catch (error) {
                console.error('Error updating parcel:', error);
                alert('Failed to connect to server');
            }
        }

        function normalizeDateValue(value) {
            if (!value) return '';
            const isoPattern = /^\d{4}-\d{2}-\d{2}$/;
            const ddmmyyyyPattern = /^\d{2}-\d{2}-\d{4}$/;
            if (isoPattern.test(value)) {
                return value;
            }
            if (ddmmyyyyPattern.test(value)) {
                const [day, month, year] = value.split('-');
                return `${year}-${month}-${day}`;
            }
            const parsedDate = new Date(value);
            return Number.isNaN(parsedDate.getTime()) ? '' : parsedDate.toISOString().split('T')[0];
        }

        function filterParcels() {
            const rawDateFilter = document.getElementById('dateFilter').value;
            const dateFilter = normalizeDateValue(rawDateFilter);
            const rawSearchFilter = document.getElementById('searchInput').value;
            const searchFilter = rawSearchFilter.trim().toLowerCase();
            const parcelIdFilter = document.getElementById('parcelIdSearch').value.trim();

            filteredParcels = parcels.filter(parcel => {
                // Date filter
                const dateMatch = !dateFilter || parcel.arrival_date === dateFilter;
                
                // Parcel ID filter
                const parcelIdMatch = !parcelIdFilter || parcel.parcel_id === parcelIdFilter;

                // General search filter
                const sapId = (parcel.sap_id || '').toLowerCase();
                const studentName = (parcel.student_name || '').toLowerCase();
                const phone = String(parcel.phone || '');
                
                const searchMatch = !searchFilter || (
                    studentName.includes(searchFilter) ||
                    phone.includes(searchFilter) ||
                    sapId.includes(searchFilter)
                );

                return dateMatch && parcelIdMatch && searchMatch;
            });

            renderTable();
        }

        function searchParcels() {
            filterParcels();
        }

        function clearFilters() {
            document.getElementById('dateFilter').value = '';
            document.getElementById('parcelIdSearch').value = '';
            document.getElementById('searchInput').value = '';
            filteredParcels = [...parcels];
            renderTable();
        }

        checkAdminLogin();
    </script>
</body>
</html>
